<?xml version="1.0" encoding="UTF-8"?>
<svg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4ECDC4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#45B7D1;stop-opacity:1" />
    </linearGradient>
    
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="30" cy="30" r="28" fill="url(#iconGradient)" filter="url(#shadow)"/>
  
  <!-- Beam icon -->
  <g transform="translate(15, 20)">
    <!-- Source point -->
    <circle cx="5" cy="10" r="3" fill="white"/>
    
    <!-- Main beam -->
    <path d="M 8 10 L 20 4 L 20 7 L 13 10 L 20 13 L 20 16 Z" fill="white" opacity="0.95"/>
    
    <!-- Secondary beams -->
    <path d="M 15 10 L 25 2 L 25 5 L 20 8 L 25 11 L 25 14 Z" fill="white" opacity="0.7"/>
    <path d="M 20 10 L 28 0 L 28 3 L 24 6 L 28 9 L 28 12 Z" fill="white" opacity="0.5"/>
    
    <!-- Live indicator -->
    <circle cx="2" cy="5" r="1.5" fill="#FF4757">
      <animate attributeName="opacity" values="1;0.2;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="7" cy="2" r="1.5" fill="#FF4757">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="2" cy="15" r="1.5" fill="#FF4757">
      <animate attributeName="opacity" values="1;0.2;1" dur="2s" repeatCount="indefinite" begin="1s"/>
    </circle>
  </g>
</svg>