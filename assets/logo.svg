<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="60" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient for the beam effect -->
    <linearGradient id="beamGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4ECDC4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#45B7D1;stop-opacity:1" />
    </linearGradient>
    
    <!-- Gradient for text -->
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2C3E50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34495E;stop-opacity:1" />
    </linearGradient>
    
    <!-- Drop shadow filter -->
    <filter id="dropshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <!-- Background circle for the icon -->
  <circle cx="30" cy="30" r="25" fill="url(#beamGradient)" filter="url(#dropshadow)"/>
  
  <!-- Beam/Signal icon -->
  <g transform="translate(20, 20)">
    <!-- Central dot (source) -->
    <circle cx="5" cy="10" r="2" fill="white"/>
    
    <!-- Beam rays -->
    <path d="M 7 10 L 15 5 L 15 7 L 10 10 L 15 13 L 15 15 Z" fill="white" opacity="0.9"/>
    <path d="M 12 10 L 18 3 L 18 5 L 15 8 L 18 11 L 18 13 Z" fill="white" opacity="0.7"/>
    <path d="M 16 10 L 22 1 L 22 3 L 19 6 L 22 9 L 22 11 Z" fill="white" opacity="0.5"/>
    
    <!-- Live indicator dots -->
    <circle cx="3" cy="6" r="1" fill="#FF4757">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="6" cy="3" r="1" fill="#FF4757">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="3" cy="14" r="1" fill="#FF4757">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
  </g>
  
  <!-- Company name -->
  <text x="65" y="25" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="url(#textGradient)">BEAM</text>
  <text x="65" y="42" font-family="Arial, sans-serif" font-size="10" fill="#7F8C8D" letter-spacing="2px">LIVESTREAMING</text>
</svg>