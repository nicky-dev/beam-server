<?xml version="1.0" encoding="UTF-8"?>
<svg width="300" height="80" viewBox="0 0 300 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4ECDC4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#45B7D1;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="textMainGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2C3E50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34495E;stop-opacity:1" />
    </linearGradient>
    
    <filter id="logoShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Icon background -->
  <circle cx="40" cy="40" r="35" fill="url(#logoGradient)" filter="url(#logoShadow)"/>
  
  <!-- Beam icon -->
  <g transform="translate(20, 25)">
    <!-- Source -->
    <circle cx="8" cy="15" r="4" fill="white"/>
    
    <!-- Primary beam -->
    <path d="M 12 15 L 30 6 L 30 10 L 20 15 L 30 20 L 30 24 Z" fill="white" opacity="0.95"/>
    
    <!-- Secondary beams -->
    <path d="M 22 15 L 35 3 L 35 7 L 28 12 L 35 17 L 35 21 Z" fill="white" opacity="0.75"/>
    <path d="M 30 15 L 40 0 L 40 4 L 35 9 L 40 14 L 40 18 Z" fill="white" opacity="0.55"/>
    
    <!-- Live indicators -->
    <circle cx="3" cy="8" r="2" fill="#FF4757">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="10" cy="4" r="2" fill="#FF4757">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="3" cy="22" r="2" fill="#FF4757">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite" begin="0.6s"/>
    </circle>
  </g>
  
  <!-- Main text -->
  <text x="90" y="35" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="url(#textMainGradient)">BEAM</text>
  
  <!-- Subtitle -->
  <text x="90" y="55" font-family="Arial, sans-serif" font-size="14" fill="#7F8C8D" letter-spacing="3px">LIVESTREAMING PLATFORM</text>
</svg>